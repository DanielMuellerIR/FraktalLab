[build]
  # Reiner JS/Vite-Build (kein Rust/WASM mehr — Fraktale laufen auf der GPU)
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "frontend/dist"

[[headers]]
  for = "/*"
  [headers.values]
    # credentialless: erlaubt Cross-Origin-Medien (archive.org-Video)
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
